spring.application.name=backend

# ===================================================
# Server Configuration
# ===================================================
server.port=8081

# ===================================================
# MySQL DataSource Configuration
# ===================================================
spring.datasource.url=jdbc:mysql://localhost:3306/finvault_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================
# Spring Data JPA / Hibernate Configuration
# ===================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialect is auto-detected by Hibernate 7+ from the JDBC driver — no need to set explicitly
# Disable open-in-view — FinVault is a stateless REST API, not a view-rendering app
spring.jpa.open-in-view=false

# ===================================================
# Logging Configuration
# ===================================================
logging.level.root=INFO
logging.level.com.finvault=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
