spring.datasource.url=jdbc:mysql://mysql-14d879d8-cognizant-c21.e.aivencloud.com:17608/defaultdb?useSSL=true&sslMode=REQUIRED&trustCertificateKeyStoreUrl=file:src/main/resources/ca.pem&trustCertificateKeyStoreType=PEM

#spring.datasource.username=root
