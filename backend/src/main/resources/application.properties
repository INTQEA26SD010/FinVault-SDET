spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update


spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true


spring.jpa.open-in-view=false


# Root level: show INFO and above for everything
logging.level.root=INFO

# Our code (com.finvault): show DEBUG level (see detailed logs from our services)
logging.level.com.finvault=DEBUG

# Spring Web: show DEBUG (see incoming HTTP requests, response codes)
logging.level.org.springframework.web=DEBUG

# Hibernate SQL: show DEBUG (see the actual SQL queries being executed)
logging.level.org.hibernate.SQL=DEBUG

