# ════════════════════════════════════════════════════════════════════════════════
# FinVault Backend — Application Configuration
# ════════════════════════════════════════════════════════════════════════════════
#
# WHAT IS THIS FILE?
# application.properties is where you configure your Spring Boot application.
# Spring reads this file at startup and uses these values to set up:
#   - Server port
#   - Database connection
#   - JPA/Hibernate behavior
#   - Logging levels
#
# HOW TO READ THIS FILE:
# Each line is a key=value pair:
#   property.name=value
#
# Lines starting with # are comments (ignored by Spring).
# ════════════════════════════════════════════════════════════════════════════════

# Application name (used in logs and Spring Boot Admin)
spring.application.name=backend

# ═══════════════════════════════════════════════════════════════════════════════
# SERVER CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
# The port your backend API listens on.
# After starting, the API is accessible at: http://localhost:8081
# We use 8081 (not default 8080) to avoid conflicts with other services.
# Angular dev server runs on 4200, so there's no port conflict.
server.port=8081

# ═══════════════════════════════════════════════════════════════════════════════
# MYSQL DATABASE CONNECTION
# ═══════════════════════════════════════════════════════════════════════════════
#
# These settings tell Spring how to connect to your MySQL database.
# PREREQUISITE: You must have MySQL installed and running with a database
# called "finvault_db" created:
#   CREATE DATABASE finvault_db;
#
# CONNECTION URL EXPLAINED:
#   jdbc:mysql://        → Use MySQL driver via JDBC (Java Database Connectivity)
#   localhost:3306       → MySQL is running on your local machine, port 3306 (default)
#   /finvault_db         → The database name to connect to
#   ?useSSL=false        → Don't use SSL encryption (fine for local development)
#   &serverTimezone=UTC  → Use UTC timezone for date/time columns
#   &allowPublicKeyRetrieval=true → Allow public key retrieval (needed for newer MySQL versions)
#
spring.datasource.url=jdbc:mysql://localhost:3306/finvault_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# MySQL login credentials (change these if your MySQL has different credentials)
spring.datasource.username=root
spring.datasource.password=root

# The JDBC driver class — tells Java which driver to use for MySQL connections
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ═══════════════════════════════════════════════════════════════════════════════
# JPA (Java Persistence API) / HIBERNATE CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
#
# Hibernate is the JPA implementation that translates your Java entities
# into SQL tables and queries automatically.

# DDL-AUTO MODES (how Hibernate manages the database schema):
#   none     → Hibernate does nothing (you manage tables manually with SQL)
#   validate → Hibernate checks if tables match entities (throws error if not)
#   update   → Hibernate CREATES new tables/columns if missing (NEVER deletes)  ← WE USE THIS
#   create   → Hibernate DROPS all tables and re-creates them every startup (DATA LOST!)
#   create-drop → Same as 'create' but also drops on shutdown
#
# "update" is perfect for development: it auto-creates tables from your @Entity classes.
# For production, use "validate" or "none" with proper database migrations (Flyway/Liquibase).
spring.jpa.hibernate.ddl-auto=update

# Show the SQL queries Hibernate generates in the console (helpful for debugging)
# You'll see: Hibernate: select u1_0.id, u1_0.email ... from users u1_0 where u1_0.email=?
spring.jpa.show-sql=true

# Format the SQL nicely (with line breaks and indentation) instead of one long line
spring.jpa.properties.hibernate.format_sql=true

# Disable "Open Session in View" pattern.
# In a REST API, we don't want database sessions held open during the entire HTTP request.
# This forces us to handle lazy loading explicitly in the service layer (best practice).
spring.jpa.open-in-view=false

# NOTE: We don't set hibernate.dialect — Hibernate 7+ auto-detects it from the JDBC driver.

# ═══════════════════════════════════════════════════════════════════════════════
# LOGGING CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════
#
# LOGGING LEVELS (from least to most verbose):
#   ERROR → Only critical errors
#   WARN  → Errors + warnings
#   INFO  → Errors + warnings + informational messages
#   DEBUG → Everything above + detailed debugging info
#   TRACE → Maximum verbosity (rarely used)

# Root level: show INFO and above for everything
logging.level.root=INFO

# Our code (com.finvault): show DEBUG level (see detailed logs from our services)
logging.level.com.finvault=DEBUG

# Spring Web: show DEBUG (see incoming HTTP requests, response codes)
logging.level.org.springframework.web=DEBUG

# Hibernate SQL: show DEBUG (see the actual SQL queries being executed)
logging.level.org.hibernate.SQL=DEBUG
